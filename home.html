<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الرئيسية - أولاد شعلان</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* (نفس التنسيقات السابقة للـ home) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tahoma', sans-serif; background: #f0f2f5; color: #333; direction: rtl; }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .navbar {
      background: linear-gradient(135deg, #1a2a6c, #2d4373);
      color: white;
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .navbar .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .navbar .brand { font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    .menu-toggle { display: none; background: none; border: none; color: white; font-size: 28px; cursor: pointer; padding: 5px 10px; }
    .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; flex-wrap: wrap; }
    .nav-links li a { color: rgba(255,255,255,0.85); padding: 8px 16px; border-radius: 8px; transition: 0.3s; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .nav-links li a:hover { background: rgba(255,255,255,0.15); color: white; }
    .nav-links li a.active { background: rgba(255,255,255,0.2); color: white; }
    .hero {
      position: relative;
      background: linear-gradient(135deg, #1a2a6c, #2d4373);
      color: white;
      padding: 60px 0;
      text-align: center;
      overflow: hidden;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero img {
      max-width: 100%;
      max-height: 250px;
      object-fit: contain;
      animation: float 3s ease-in-out infinite;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
    .hero-content { position: relative; z-index: 2; }
    .hero h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
    .hero p { font-size: 18px; opacity: 0.9; }
    .slider-container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 30px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    .slider-wrapper { display: flex; transition: transform 0.6s ease-in-out; }
    .slider-slide { min-width: 100%; position: relative; }
    .slider-slide img { width: 100%; height: 400px; object-fit: cover; display: block; }
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 15px 20px;
      cursor: pointer;
      font-size: 24px;
      z-index: 10;
      border-radius: 50%;
      transition: 0.3s;
    }
    .slider-btn:hover { background: rgba(0,0,0,0.8); }
    .slider-btn.prev { left: 15px; }
    .slider-btn.next { right: 15px; }
    .slider-dots {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .slider-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: 0.3s;
    }
    .slider-dot.active { background: white; transform: scale(1.2); }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      padding: 20px 0;
    }
    .card-item {
      background: white;
      border-radius: 15px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: 0.3s;
      cursor: pointer;
    }
    .card-item:hover { transform: translateY(-8px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
    .card-item i { font-size: 48px; color: #1a2a6c; margin-bottom: 15px; }
    .card-item h3 { color: #1a2a6c; margin-bottom: 8px; }
    .card-item p { color: #666; font-size: 14px; }
    .footer {
      background: #1a1a2e;
      color: #aaa;
      padding: 30px 0;
      margin-top: 40px;
      text-align: center;
      border-top: 3px solid #2d4373;
    }
    .footer .copyright { font-size: 14px; letter-spacing: 0.5px; }
    .footer .copyright i { color: #e74c3c; }
    .footer .credit { font-size: 12px; font-weight: 300; color: #777; letter-spacing: 0.5px; }
    .footer .credit span { color: #2d4373; font-weight: bold; }
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      .nav-links { display: none; width: 100%; flex-direction: column; align-items: center; padding: 15px 0; gap: 10px; }
      .nav-links.open { display: flex; }
      .slider-slide img { height: 250px; }
      .hero { padding: 30px 0; min-height: 200px; }
      .hero h1 { font-size: 24px; }
      .hero img { max-height: 150px; }
    }
  </style>
</head>
<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar">
    <div class="container">
      <div class="brand">
        <i class="fas fa-store-alt"></i>
        <span>أولاد شعلان</span>
      </div>
      <button class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="home.html" class="active"><i class="fas fa-home"></i> الرئيسية</a></li>
        <li><a href="index.html"><i class="fas fa-tags"></i> عرض الأسعار</a></li>
        <li id="dynamicLinks"></li>
        <li><a href="login.html"><i class="fas fa-user-lock"></i> دخول</a></li>
      </ul>
    </div>
  </nav>

  <!-- ===== Hero Section ===== -->
  <section class="hero">
    <div class="container hero-content">
      <img id="headerImage" src="https://i.ibb.co/LhJVbMVM/19020.png" alt="أولاد شعلان">
      <h1>مرحباً بكم في أولاد شعلان</h1>
      <p>أكبر تشكيلة من المنتجات بأفضل الأسعار</p>
    </div>
  </section>

  <!-- ===== Slider ===== -->
  <div class="container">
    <div class="slider-container" id="sliderContainer">
      <div class="slider-wrapper" id="sliderWrapper"></div>
      <button class="slider-btn prev" onclick="changeSlide(-1)">❮</button>
      <button class="slider-btn next" onclick="changeSlide(1)">❯</button>
      <div class="slider-dots" id="sliderDots"></div>
    </div>
  </div>

  <!-- ===== Cards Section ===== -->
  <div class="container">
    <h2 style="text-align:center; color:#1a2a6c; margin: 30px 0 10px;">
      <i class="fas fa-th-large"></i> اكتشف خدماتنا
    </h2>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="container">
      <div class="copyright"><i class="fas fa-copyright"></i> جميع الحقوق محفوظة لـ أولاد شعلان للمنظفات و الورقيات 2026</div>
      <div class="credit">تم تصميم الموقع والتطبيق بواسطة <span>FAMO ELWAN</span></div>
    </div>
  </footer>

  <!-- ===== Firebase SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // =============================================
    // 🔐 بيانات Firebase
    // =============================================
    const firebaseConfig = {
      apiKey: "AIzaSyCKHRq7Bl6JQxXdWajIZBgch3TcHhzvI1g",
      authDomain: "price-famo-app.firebaseapp.com",
      databaseURL: "https://price-famo-app-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "price-famo-app",
      storageBucket: "price-famo-app.firebasestorage.app",
      messagingSenderId: "1077937125055",
      appId: "1:1077937125055:web:03c9e3192ad5233e98b80a"
    };

    // =============================================
    // 🚀 تهيئة Firebase
    // =============================================
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    console.log("✅ Firebase initialized successfully!");

    // =============================================
    // 🖼️ دوال السلايدر
    // =============================================
    let currentSlide = 0;
    let slides = [];

    async function loadSlider() {
      try {
        const snapshot = await database.ref('slider/images').once('value');
        if (snapshot.exists()) {
          const data = snapshot.val();
          slides = Object.values(data).sort((a, b) => (a.order || 0) - (b.order || 0));
        } else {
          // بيانات افتراضية
          slides = [
            { id: 'img1', url: 'https://i.ibb.co/LhJVbMVM/19020.png', order: 1 },
            { id: 'img2', url: 'https://i.ibb.co/mVtrf67C/19023.png', order: 2 }
          ];
        }
        renderSlider();
        startAutoSlide();
      } catch (e) {
        console.error('Error loading slider:', e);
      }
    }

    function renderSlider() {
      const wrapper = document.getElementById('sliderWrapper');
      const dots = document.getElementById('sliderDots');
      
      if (!slides.length) {
        wrapper.innerHTML = '<div style="padding:50px;text-align:center;color:#888;">لا توجد صور</div>';
        return;
      }

      wrapper.innerHTML = slides.map(slide => `
        <div class="slider-slide">
          <img src="${slide.url}" alt="صورة ${slide.id}" loading="lazy">
        </div>
      `).join('');

      dots.innerHTML = slides.map((_, i) => `
        <span class="slider-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></span>
      `).join('');

      currentSlide = 0;
      updateSlider();
    }

    function updateSlider() {
      const wrapper = document.getElementById('sliderWrapper');
      const dots = document.querySelectorAll('.slider-dot');
      wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSlide);
      });
    }

    window.changeSlide = function(direction) {
      const total = slides.length;
      currentSlide = (currentSlide + direction + total) % total;
      updateSlider();
    };

    window.goToSlide = function(index) {
      currentSlide = index;
      updateSlider();
    };

    let autoSlideInterval;

    function startAutoSlide() {
      if (autoSlideInterval) clearInterval(autoSlideInterval);
      autoSlideInterval = setInterval(() => {
        if (slides.length > 0) changeSlide(1);
      }, 5000);
    }

    // =============================================
    // 🃏 دوال الكروت
    // =============================================
    async function loadCards() {
      try {
        const snapshot = await database.ref('homeCards/cards').once('value');
        const grid = document.getElementById('cardsGrid');
        if (snapshot.exists()) {
          const data = snapshot.val();
          const cards = Object.values(data).sort((a, b) => (a.order || 0) - (b.order || 0));
          grid.innerHTML = cards.map(card => `
            <a href="${card.link || '#'}" class="card-item">
              <i class="fas ${card.icon || 'fa-circle'}"></i>
              <h3>${card.title || 'عنوان'}</h3>
              <p>${card.description || ''}</p>
            </a>
          `).join('');
        } else {
          // بيانات افتراضية
          grid.innerHTML = `
            <a href="index.html" class="card-item"><i class="fas fa-store"></i><h3>عرض الأسعار</h3><p>ابحث عن سعر أي منتج</p></a>
            <a href="#" class="card-item"><i class="fas fa-image"></i><h3>معرض المنتجات</h3><p>شاهد جميع المنتجات</p></a>
          `;
        }
      } catch (e) {
        console.error('Error loading cards:', e);
      }
    }

    // =============================================
    // 📋 دوال المنيو
    // =============================================
    async function loadMenuLinks() {
      try {
        const snapshot = await database.ref('menu/links').once('value');
        if (snapshot.exists()) {
          const data = snapshot.val();
          const links = Object.values(data).sort((a, b) => (a.order || 0) - (b.order || 0));
          const container = document.getElementById('dynamicLinks');
          container.innerHTML = links.map(link => `
            <li><a href="${link.url || '#'}"><i class="fas fa-link"></i> ${link.name || 'رابط'}</a></li>
          `).join('');
        }
      } catch (e) {
        console.log('Menu load error:', e);
      }
    }

    // =============================================
    // 🖼️ دوال الهيدر
    // =============================================
    async function loadHeader() {
      try {
        const snapshot = await database.ref('header/imageUrl').once('value');
        if (snapshot.exists()) {
          document.getElementById('headerImage').src = snapshot.val();
        }
      } catch (e) {
        console.error('Error loading header:', e);
      }
    }

    // =============================================
    // 🔧 دوال مساعدة
    // =============================================
    window.toggleMenu = function() {
      document.getElementById('navLinks').classList.toggle('open');
    };

    // =============================================
    // 🚀 تحميل الصفحة
    // =============================================
    await loadHeader();
    await loadSlider();
    await loadCards();
    await loadMenuLinks();

    // إيقاف التشغيل التلقائي عند التفاعل
    document.getElementById('sliderContainer')?.addEventListener('mouseenter', () => {
      clearInterval(autoSlideInterval);
    });
    document.getElementById('sliderContainer')?.addEventListener('mouseleave', () => {
      startAutoSlide();
    });
  </script>
</body>
</html>
